<style>
:root{
  --bg:#f4f2ee; --bg2:#ece9e2; --card:#ffffff; --card2:#faf9f6;
  --ink:#23211d; --ink2:#6f6b62; --ink3:#a8a399; --line:#e9e5dd;
  --accent:#f0623a;
  --income:#2bb673; --expense:#ef5350;
  --transfer:#d99e00;
  --chart-line:#2f8fff; --bar-inc:#5ec07a; --bar-exp:#ef7d7a;
  --pos:#2bb673; --neg:#ef5350;
  --shadow:0 6px 24px rgba(40,34,24,.07);
  --shadow-lg:0 14px 44px rgba(40,34,24,.16);
  --num:'Outfit',sans-serif; --sans:'Noto Sans TC',sans-serif;
  --safe:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#101725; --bg2:#1a2335; --card:#19212f; --card2:#1f293b;
  --ink:#e9edf4; --ink2:#94a0b5; --ink3:#5d6a82; --line:#283449;
  --accent:#ff7a52;
  --income:#8fd99b; --expense:#f08a8a;
  --transfer:#ffd43b;
  --chart-line:#4da3ff; --bar-inc:#7fcf8e; --bar-exp:#ef8a87;
  --pos:#8fd99b; --neg:#f08a8a;
  --shadow:0 6px 24px rgba(0,0,0,.35); --shadow-lg:0 14px 44px rgba(0,0,0,.55);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{position:fixed;inset:0;width:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow:hidden;transition:background .35s,color .35s;}

button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}
#app{max-width:480px;margin:0 auto;height:100%;position:relative;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}

.topbar{padding:max(16px,env(safe-area-inset-top)) 18px 6px;display:flex;align-items:center;justify-content:space-between;}
.topbar .title{font-size:17px;font-weight:800;}
.hgroup{display:flex;gap:9px;}
.icon-btn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:16px;border:1.5px solid var(--line);background:var(--card);transition:transform .15s;}
.icon-btn:active{transform:scale(.9);}
[data-theme="dark"] .icon-btn{border-color:#2f6db0;color:#9cc4f5;background:transparent;}

.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 18px 124px;}
.screen.hidden{display:none;}

.nw{text-align:center;padding:8px 0 4px;}
.nw .lbl{font-size:12px;color:var(--ink3);font-weight:600;}
.nw .main{display:flex;align-items:baseline;justify-content:center;gap:10px;margin-top:2px;}
.nw .cur{font-family:var(--num);font-size:21px;font-weight:700;color:var(--ink2);}
.nw .big{font-family:var(--num);font-size:46px;font-weight:800;color:var(--pos);letter-spacing:-1px;line-height:1;}
.nw .big.neg{color:var(--neg);}
.nw .ab{display:flex;justify-content:center;gap:22px;margin-top:10px;font-size:13px;}
.nw .ab span{color:var(--ink3);}
.nw .ab b{font-family:var(--num);font-weight:700;}
.nw .ab .a{color:var(--pos);} .nw .ab .l{color:var(--neg);}
.nw .links{display:flex;justify-content:center;gap:26px;margin-top:12px;}
.nw .links button{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:var(--ink2);border-bottom:1.5px solid var(--ink3);padding-bottom:2px;}
.nw .links button .pie{width:13px;height:13px;border-radius:50%;background:conic-gradient(var(--chart-line) 0 40%,var(--bar-inc) 40% 70%,var(--bar-exp) 70% 100%);}

.chart-box{margin:16px 0 6px;}
.chart-box svg{width:100%;height:auto;display:block;overflow:visible;}
.axis-txt{fill:var(--ink3);font-family:var(--num);font-size:9px;font-weight:600;}
.grid-l{stroke:var(--line);stroke-width:1;}
.daterow{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 6px;margin-top:6px;}
.daterow .dt{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--ink2);}
.daterow .dt::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--chart-line);}
.rangeseg{display:flex;background:var(--bg2);border-radius:11px;padding:3px;}
.rangeseg button{padding:6px 14px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink2);transition:.2s;}
.rangeseg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow);}

.grp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 4px 8px;cursor:pointer;}
.grp-head .lft{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:700;}
.grp-head .tog{width:18px;height:18px;border-radius:6px;display:grid;place-items:center;font-size:14px;color:var(--ink3);border:1.5px solid var(--line);line-height:1;}
.grp-head .cnt{color:var(--ink3);font-weight:500;font-size:13px;}
.grp-head .sub{font-family:var(--num);font-size:15px;font-weight:700;}
.grp-head .sub.pos{color:var(--pos);} .grp-head .sub.neg{color:var(--neg);}
.acct{display:flex;align-items:center;gap:14px;padding:13px 4px;border-top:1px solid var(--line);transition:opacity .15s;}
.acct:active{opacity:.55;}
.av{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:23px;flex-shrink:0;background-position:center;background-size:cover;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.acct .nm{flex:1;font-size:16px;font-weight:600;}
.acct .bal{font-family:var(--num);font-size:17px;font-weight:700;}
.acct .bal.pos{color:var(--pos);} .acct .bal.neg{color:var(--neg);}
.grp-manage{width:100%;margin-top:20px;padding:13px;border-radius:14px;border:1.5px dashed var(--line);color:var(--ink2);font-size:13.5px;font-weight:600;}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin:18px 4px 12px;}
.sec-head h2{font-size:15px;font-weight:700;}
.day-group{margin-bottom:6px;}
.day-label{display:flex;justify-content:space-between;align-items:baseline;padding:14px 4px 8px;}
.day-label .d{font-size:12.5px;color:var(--ink2);font-weight:600;}
.day-label .s{font-size:12px;color:var(--ink3);font-family:var(--num);font-weight:600;}
.tx-list{background:var(--card);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;}
.tx{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--line);transition:background .12s;}
.tx:last-child{border-bottom:none;}
.tx:active{background:var(--card2);}
.tx .ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:20px;flex-shrink:0;}
.tx .mid{flex:1;min-width:0;}
.tx .nm2{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx .sub{font-size:11.5px;color:var(--ink3);margin-top:2px;}
.tx .val{font-family:var(--num);font-size:16px;font-weight:700;flex-shrink:0;}
.val.exp{color:var(--expense);} .val.inc{color:var(--income);} .val.tr{color:var(--transfer);}
.empty{text-align:center;padding:50px 20px;color:var(--ink3);}
.empty .e{font-size:44px;margin-bottom:10px;} .empty p{font-size:13.5px;}

.bud{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px;}
.bud .top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.bud .ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:18px;}
.bud .nm{font-size:14px;font-weight:700;flex:1;}
.bud .fig{font-family:var(--num);font-size:13px;color:var(--ink2);font-weight:600;}
.bud .fig b{color:var(--ink);}
.bar{height:9px;border-radius:6px;background:var(--bg2);overflow:hidden;}
.bar i{display:block;height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.bud .pct{font-size:11px;color:var(--ink3);margin-top:7px;display:flex;justify-content:space-between;}

.recur-typeseg button.on[data-t="income"]{background:var(--income);color:#fff;}

.tabbar{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:flex-end;padding:8px 14px calc(10px + var(--safe));background:var(--card);border-top:1px solid var(--line);box-shadow:0 -4px 20px rgba(0,0,0,.05);z-index:20;}

<div id="app">
  <div class="topbar">
    <button class="icon-btn" id="eyeBtn">👁</button>

const CURRENCIES=[{c:'TWD',s:'NT$',n:'台幣'},{c:'USD',s:'US$',n:'美元'},{c:'JPY',s:'¥',n:'日圓'},{c:'EUR',s:'€',n:'歐元'},{c:'CNY',s:'CN¥',n:'人民幣'},{c:'HKD',s:'HK$',n:'港幣'},{c:'GBP',s:'£',n:'英鎊'},{c:'AUD',s:'A$',n:'澳幣'},{c:'KRW',s:'₩',n:'韓元'},{c:'SGD',s:'S$',n:'新幣'}];
const CCYMAP={};CURRENCIES.forEach(x=>CCYMAP[x.c]=x);
const ccyInfo=c=>CCYMAP[c]||{c:c,s:'',n:c};
function fx(ccy){if(!ccy||ccy==='TWD')return 1;const r=fxRates[ccy];return(r&&isFinite(r)&&r>0)?r:1;}
function acctCcy(id){const a=accounts.find(x=>x.id===id);return a?(a.ccy||'TWD'):'TWD';}
function txTWD(t){return t.amt*fx(acctCcy(t.acct));}
function feeTWD(t){return(t.type==='transfer'&&t.fee)?t.fee*fx(acctCcy(t.acct)):0;}
function expFlow(t){return(t.type==='expense'?txTWD(t):0)+feeTWD(t);}
function incFlow(t){return t.type==='income'?txTWD(t):0;}
const netWorth=()=>accounts.reduce((s,a)=>s+a.bal*fx(a.ccy),0);
const totalAsset=()=>accounts.reduce((s,a)=>s+Math.max(0,a.bal*fx(a.ccy)),0);
const totalLiab=()=>accounts.reduce((s,a)=>s+Math.max(0,-a.bal*fx(a.ccy)),0);
async function fetchRates(showToast){const urls=['https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/twd.json','https://latest.currency-api.pages.dev/v1/currencies/twd.json'];
 for(const u of urls){try{const res=await fetch(u);if(!res.ok)continue;const data=await res.json();const tbl=data.twd;if(!tbl)continue;const nr={TWD:1};CURRENCIES.forEach(x=>{if(x.c==='TWD')return;const v=tbl[x.c.toLowerCase()];if(v&&v>0)nr[x.c]=1/v;});fxRates=nr;fxDate=data.date||new Date().toISOString().slice(0,10);Store.set('fxRates',fxRates);Store.set('fxDate',fxDate);renderOverview();if($('#setSheet').classList.contains('open'))renderFxRow();if(showToast)toast('匯率已更新（'+fxDate+'）');return true;}catch(e){}}
 if(showToast)toast('無法取得即時匯率，沿用上次匯率');return false;}
const pad2=n=>String(n).padStart(2,'0');
const ymd=()=>{const d=new Date();return ''+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate());};

/* recurring engine */
function firstNext(freq,day){const now=new Date();now.setHours(12,0,0,0);
 if(freq==='weekly'){const diff=(day-now.getDay()+7)%7;const d=new Date(now);d.setDate(now.getDate()+diff);return d.toISOString();}
 const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();let d=new Date(now.getFullYear(),now.getMonth(),Math.min(day,dim),12,0,0);
 if(d<now){const ny=now.getMonth()===11?now.getFullYear()+1:now.getFullYear(),nm=(now.getMonth()+1)%12,dim2=new Date(ny,nm+1,0).getDate();d=new Date(ny,nm,Math.min(day,dim2),12,0,0);}return d.toISOString();}
function advance(iso,freq,day){const d=new Date(iso);if(freq==='weekly'){d.setDate(d.getDate()+7);return d.toISOString();}
 const y=d.getFullYear(),m=d.getMonth(),ny=m===11?y+1:y,nm=(m+1)%12,dim=new Date(ny,nm+1,0).getDate();return new Date(ny,nm,Math.min(day,dim),12,0,0).toISOString();}
function postDueRecurrings(){let posted=0;const today=new Date();today.setHours(23,59,59,999);
 recurrings.forEach(r=>{if(r.active===false)return;let guard=0;
  while(new Date(r.nextDate)<=today&&guard<400){const t={id:'t'+rnd(),type:r.type,amt:r.amt,acct:r.acct,note:(r.note||'')+' (循環)',date:new Date(r.nextDate).toISOString()};
   if(r.type==='transfer')t.to=r.to;else t.cat=r.cat;transactions.push(t);applyBalance(t,1);posted++;r.nextDate=advance(r.nextDate,r.freq,r.day);guard++;}});
 if(posted){persist();persistRecur();}return posted;}

/* chart */
function buildSeries(mode){const now=new Date();let buckets=[];
 if(mode==='day'){const t=new Date(now);t.setHours(0,0,0,0);for(let i=9;i>=0;i--){const s=new Date(t);s.setDate(t.getDate()-i);const e=new Date(s);e.setHours(23,59,59,999);buckets.push({label:(s.getMonth()+1)+'/'+s.getDate(),start:s.getTime(),end:e.getTime()});}}
 else if(mode==='week'){const t=new Date(now);t.setHours(23,59,59,999);for(let i=7;i>=0;i--){const e=new Date(t);e.setDate(t.getDate()-i*7);const s=new Date(e);s.setDate(e.getDate()-6);s.setHours(0,0,0,0);buckets.push({label:(e.getMonth()+1)+'/'+e.getDate(),start:s.getTime(),end:e.getTime()});}}
 else{for(let i=5;i>=0;i--){const s=new Date(now.getFullYear(),now.getMonth()-i,1);const e=new Date(now.getFullYear(),now.getMonth()-i+1,0,23,59,59,999);buckets.push({label:(s.getMonth()+1)+'月',start:s.getTime(),end:e.getTime()});}}
 const inc=[],exp=[];buckets.forEach(b=>{let ai=0,ae=0;transactions.forEach(t=>{const tm=new Date(t.date).getTime();if(tm>=b.start&&tm<=b.end){ai+=incFlow(t);ae+=expFlow(t);}});inc.push(ai);exp.push(ae);});
 const N=buckets.length,nw=new Array(N);nw[N-1]=netWorth();for(let i=N-1;i>0;i--)nw[i-1]=nw[i]-(inc[i]-exp[i]);return{buckets,inc,exp,nw};}
function setChartMode(m){chartMode=m;Store.set('chartMode',m);document.querySelectorAll('#rangeSeg button').forEach(b=>b.classList.toggle('on',b.dataset.r===m));buildChart();}
function buildChart(){const{buckets,inc,exp,nw}=buildSeries(chartMode);const N=buckets.length;
 const W=360,H=196,PL=2,PR=2,PT=14,PB=26,pw=W-PL-PR,ph=H-PT-PB,baseY=H-PB,slot=pw/N;
 const nice=v=>{if(v<=0)return 1;const p=Math.pow(10,Math.floor(Math.log10(v)));const f=v/p;let nf=f<=1?1:f<=2?2:f<=5?5:10;return nf*p;};
 const topFlow=nice(Math.max(1,...inc,...exp));let lo=Math.min(...nw),hi=Math.max(...nw);if(hi===lo){hi+=1000;lo-=1000;}const pad=(hi-lo)*0.35;lo-=pad;hi+=pad;
 const yLine=v=>PT+(1-(v-lo)/(hi-lo))*ph,yBar=v=>v/topFlow*ph;
 const sm=n=>{const x=Math.abs(n);if(x>=1e6)return(x/1e6).toFixed(2)+'M';if(x>=1e3)return Math.round(x/1e3)+'K';return Math.round(x);};
 const bw=Math.max(3,Math.min(7,slot*0.16));let bars='',labels='',grid='',dots='',clk='';
 for(let g=0;g<=2;g++){const yy=PT+ph*g/2,val=hi-(hi-lo)*g/2;grid+=`<line class="grid-l" x1="${PL}" y1="${yy.toFixed(1)}" x2="${W-PR}" y2="${yy.toFixed(1)}" opacity=".5"/>`;labels+=`<text class="axis-txt" x="${W-PR}" y="${(yy-3).toFixed(1)}" text-anchor="end">${sm(val)}</text>`;}
 labels+=`<text class="axis-txt" x="${PL}" y="${PT+8}" text-anchor="start">${sm(topFlow)}</text>`;
 buckets.forEach((b,i)=>{const cx=PL+slot*(i+0.5);
  if(inc[i]>0){const h=yBar(inc[i]);bars+=`<rect x="${(cx-bw-1).toFixed(1)}" y="${(baseY-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="1.5" fill="var(--bar-inc)"/>`;}
  if(exp[i]>0){const h=yBar(exp[i]);bars+=`<rect x="${(cx+1).toFixed(1)}" y="${(baseY-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="1.5" fill="var(--bar-exp)"/>`;}
  labels+=`<text class="axis-txt" x="${cx.toFixed(1)}" y="${H-8}" text-anchor="middle">${b.label}</text>`;
  clk+=`<rect x="${(PL+slot*i).toFixed(1)}" y="${PT}" width="${slot.toFixed(1)}" height="${ph}" fill="transparent" style="cursor:pointer" onclick="showRange(${b.start},${b.end},'${b.label}')"/>`;});
 const pts=nw.map((v,i)=>[PL+slot*(i+0.5),yLine(v)]);const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 const area=line+` L${pts[N-1][0].toFixed(1)} ${baseY} L${pts[0][0].toFixed(1)} ${baseY} Z`;pts.forEach(p=>dots+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2" fill="var(--chart-line)"/>`);
 $('#chartBox').innerHTML=`<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--chart-line)" stop-opacity=".28"/><stop offset="1" stop-color="var(--chart-line)" stop-opacity="0"/></linearGradient></defs>${grid}<line class="grid-l" x1="${PL}" y1="${baseY}" x2="${W-PR}" y2="${baseY}"/>${bars}<path d="${area}" fill="url(#ag)"/><path d="${line}" fill="none" stroke="var(--chart-line)" stroke-width="2.2" stroke-linejoin="round"/>${dots}${labels}${clk}</svg>`;}

function dayLabel(d){const x=new Date(d),now=new Date(),tk=dayKey(now),yk=dayKey(new Date(now.getFullYear(),now.getMonth(),now.getDate()-1)),w='日一二三四五六'[x.getDay()];if(dayKey(x)===tk)return '今天 · '+(x.getMonth()+1)+'/'+x.getDate();if(dayKey(x)===yk)return '昨天 · '+(x.getMonth()+1)+'/'+x.getDate();return (x.getMonth()+1)+'月'+x.getDate()+'日 · 週'+w;}
function txRowHTML(t,handler){handler=handler||'editTx';let ic,nm,color,sign,cls,sub,disp=t.amt;const acc=accounts.find(a=>a.id===t.acct);
 if(t.type==='transfer'){const to=accounts.find(a=>a.id===t.to);ic='🔄';color='#5b86e5';nm=t.note||'轉帳';sign='';cls='tr';disp=t.amt+(t.fee||0);sub=(acc?acc.n:'?')+' → '+(to?to.n:'?')+(t.fee?'（含手續費 '+fmtN(t.fee)+'）':'');}
 else{const c=CATMAP[t.cat]||{ic:'📦',n:'其他',c:'#888'};ic=c.ic;color=c.c;nm=t.note||c.n;sign=t.type==='income'?'+':'-';cls=t.type==='income'?'inc':'exp';sub=c.n+(acc?' · '+acc.n:'')+(t.occy?' · 原幣 '+ccyInfo(t.occy).s+fmtN(t.oamt):'');}
 const ccy=acctCcy(t.acct),sym=ccy==='TWD'?'':ccyInfo(ccy).s;
 return `<div class="tx" onclick="${handler}('${t.id}')"><div class="ic" style="background:${color}22">${ic}</div><div class="mid"><div class="nm2">${nm}${t.img?'<span class="clip">📎</span>':''}</div><div class="sub">${sub}</div></div><div class="val ${cls}">${sign}${sym}${fmtN(disp)}</div></div>`;}

/* calendar view */

function renderCalendar(){const y=calRef.getFullYear(),m=calRef.getMonth();const dayExp={},dayInc={};let mInc=0,mExp=0;
 transactions.forEach(t=>{const d=new Date(t.date);if(d.getFullYear()===y&&d.getMonth()===m){const k=d.getDate();const ef=expFlow(t),inf=incFlow(t);if(ef){dayExp[k]=(dayExp[k]||0)+ef;mExp+=ef;}if(inf){dayInc[k]=(dayInc[k]||0)+inf;mInc+=inf;}}});
 const startDow=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),prevDim=new Date(y,m,0).getDate(),todayK=dayKey(new Date());
 let cells='';for(let i=0;i<startDow;i++){const dn=prevDim-startDow+1+i;cells+=`<div class="cal-day oth"><span class="dn">${dn}</span></div>`;}
 for(let dn=1;dn<=dim;dn++){const do2=new Date(y,m,dn),k=dayKey(do2),isT=k===todayK,isSun=do2.getDay()===0,sel=k===calSelected,ex=dayExp[dn],inc=dayInc[dn];
  cells+=`<div class="cal-day${isT?' today':''}${isSun?' sun':''}${sel?' sel':''}" onclick="calPick('${do2.toISOString()}')"><span class="dn">${dn}</span>${ex?`<span class="ce">-${calAbbr(ex)}</span>`:''}${inc?`<span class="ci">+${calAbbr(inc)}</span>`:''}</div>`;}
 const total=startDow+dim,trail=(7-total%7)%7;for(let i=1;i<=trail;i++)cells+=`<div class="cal-day oth"><span class="dn">${i}</span></div>`;
 const wd=['日','一','二','三','四','五','六'].map(w=>`<div class="cal-wd">週${w}</div>`).join('');
 $('#recCal').innerHTML=`<div class="cal-nav"><button onclick="calShift(-1)">‹</button><span class="m">${y} / ${pad2(m+1)}</span><button onclick="calShift(1)">›</button></div><div class="cal-grid">${wd}${cells}</div><div class="cal-sum"><span>支出 <b style="color:var(--expense)">$${fmtN(mExp)}</b></span><span>收入 <b style="color:var(--income)">$${fmtN(mInc)}</b></span><span>結餘 <b>${mInc-mExp>=0?'+':'-'}$${fmtN(Math.abs(mInc-mExp))}</b></span></div><div id="calDayList"></div>`;
 renderCalDayList();}

function nlNum(s){const m=String(s).match(/[0-9][0-9,]*(\.[0-9]+)?/);return m?parseFloat(m[0].replace(/,/g,'')):null;}
function findAccountByText(text){const t=String(text).toLowerCase().replace(/\s/g,'');let best=null,score=0;
 accounts.forEach(a=>{const name=(a.n||'').toLowerCase();const nameNS=name.replace(/\s/g,'');let s=0;
  if(nameNS&&t.includes(nameNS))s=Math.max(s,nameNS.length*3);
  name.split(/[\s\/\-]+/).forEach(tok=>{tok=tok.trim();if(tok.length>=2&&t.includes(tok))s=Math.max(s,tok.length*2);});
  if(a.group&&t.includes(a.group.toLowerCase()))s=Math.max(s,a.group.length);
  if(s>score){score=s;best=a;}});
 return score>0?best:null;}
function findCatByText(text,list){let best=null,bl=0;list.forEach(c=>{if(c.n&&text.includes(c.n)&&c.n.length>bl){best=c;bl=c.n.length;}});return best;}
function nlAliasCat(text,list){for(const id in NL_ALIAS){if(NL_ALIAS[id].some(w=>text.toLowerCase().includes(w))){const c=list.find(x=>x.id===id);if(c)return c;}}return null;}
function nlCcy(text){const t=text.toLowerCase();const M=[['JPY',['日幣','日圓','日元','円','jpy']],['USD',['美金','美元','usd']],['EUR',['歐元','eur']],['CNY',['人民幣','rmb','cny']],['HKD',['港幣','港元','hkd']],['GBP',['英鎊','gbp']],['AUD',['澳幣','澳元','aud']],['KRW',['韓元','韓幣','krw']],['SGD',['新加坡幣','星幣','sgd']],['TWD',['台幣','新台幣','twd']]];for(const x of M){if(x[1].some(w=>t.includes(w)))return x[0];}return null;}
function nlParse(){let text=($('#nlInput').value||'').trim();if(!text){toast('輸入一句話，例如：午餐 120 信用卡');return;}
 const isTransfer=/轉|→|->/.test(text);
 if(isTransfer){let fee=0;const fm=text.match(/(手續費|手續|含費)\s*([0-9][0-9,]*)/);if(fm)fee=parseFloat(fm[2].replace(/,/g,''))||0;let work=fm?text.replace(fm[0],' '):text;
  const segs=work.split(/到|→|->|轉入|轉至|轉到/);const from=findAccountByText(segs[0]||'')||accounts[0];let to=findAccountByText(segs.slice(1).join(' '));if(!to||to.id===from.id)to=accounts.find(a=>a.id!==from.id)||from;
  const amt=Math.abs(nlNum(work.replace(/轉帳|轉/g,' '))||0);
  cur={type:'transfer',cat:null,acct:from.id,note:'',expr:String(amt),editId:null,date:null,img:null,fee:fee};
  setType('transfer');fillAccountSelects();$('#tfFrom').value=from.id;$('#tfTo').value=to.id;$('#tfFee').value=fee||'';$('#padDisplay').textContent=fmtN(amt);updateTfTotal();
  $('#nlInput').value='';toast('已解析轉帳，確認後按儲存');return;}
 const amt=nlNum(text);if(amt==null){toast('找不到金額，例如：咖啡 90');return;}
 const incomeHint=/^\s*\+/.test(text)||/(收入|收到|薪水|薪資|月薪|工資|獎金|分紅|年終|紅包|退款|退費|退稅|入帳|進帳|利息|股利|配息|兼職|打工|接案|家教|鐘點|外快|稿費|報酬|佣金|賺|獲利|盈利|回饋|租金收)/.test(text);
 const type=incomeHint?'income':'expense';const list=type==='income'?incCats:expCats;
 let cat=findCatByText(text,list)||nlAliasCat(text,list)||list[0];
 let acc=findAccountByText(text);
 const acctId=acc?acc.id:(accounts[0]&&accounts[0].id);const aCcy=nlCcy(text);
 cur={type,cat:cat?cat.id:list[0]&&list[0].id,acct:acctId,ccy:aCcy||acctCcy(acctId),note:'',expr:String(Math.abs(amt)),editId:null,date:null,img:null,fee:0};

function evalExpr(e){try{if(/[+\-]$/.test(e))e=e.slice(0,-1);const v=Function('"use strict";return('+e.replace(/[^0-9.+\-]/g,'')+')')();return isFinite(v)?v:0;}catch(_){return 0;}}

function updateTfTotal(){const el=$('#tfTotal');if(!el)return;if(cur.type!=='transfer'){el.textContent='';return;}const amt=Math.abs(evalExpr(cur.expr))||0;const fee=Math.max(0,Math.round(parseFloat(($('#tfFee').value||'0').replace(/,/g,''))||0));const sym=ccyInfo(acctCcy($('#tfFrom').value)).s||'$';el.textContent=fee?('轉出後實際扣款 '+sym+fmtN(amt+fee)+'（轉帳 '+sym+fmtN(amt)+' ＋ 手續費 '+sym+fmtN(fee)+'）'):'';}

 let t;if(cur.type==='transfer'){const from=$('#tfFrom').value,to=$('#tfTo').value;if(from===to){toast('轉出入帳戶相同');return;}const fee=Math.max(0,Math.round(parseFloat(($('#tfFee').value||'0').replace(/,/g,''))||0));t={id:'t'+rnd(),type:'transfer',amt,acct:from,to,note:cur.note,date:cur.date||new Date().toISOString()};if(fee>0)t.fee=fee;const fc=acctCcy(from),tc=acctCcy(to);if(fc!==tc)t.toAmt=Math.round(amt*fx(fc)/fx(tc));}

function loadImg(file){const r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>{const size=132,c=document.createElement('canvas');c.width=c.height=size;const ctx=c.getContext('2d');const s=Math.min(im.width,im.height),sx=(im.width-s)/2,sy=(im.height-s)/2;ctx.drawImage(im,sx,sy,s,s,0,0,size,size);afImg=c.toDataURL('image/jpeg',0.82);renderAfPreview();};im.src=r.result;};r.readAsDataURL(file);}

/* ===== Account detail ===== */
let adId=null,adYM=null;
function acctTxEffect(t,id){if(t.type==='transfer'){let v=0;if(t.acct===id)v-=t.amt+(t.fee||0);if(t.to===id)v+=(t.toAmt!=null?t.toAmt:t.amt);return v;}if(t.acct!==id)return 0;return t.type==='income'?t.amt:-t.amt;}
function acctBalanceAt(id,endTime){const a=accounts.find(x=>x.id===id);if(!a)return 0;let bal=a.bal;transactions.forEach(t=>{if(new Date(t.date).getTime()>endTime)bal-=acctTxEffect(t,id);});return bal;}
function openAcctDetail(id){adId=id;const now=new Date();adYM=[now.getFullYear(),now.getMonth()];renderAcctDetail();$('#acctDetailSheet').classList.add('open');syncMask();}
function closeAcctDetail(){$('#acctDetailSheet').classList.remove('open');syncMask();}
function adShift(d){adYM[1]+=d;if(adYM[1]<0){adYM[1]=11;adYM[0]--;}if(adYM[1]>11){adYM[1]=0;adYM[0]++;}renderAcctDetail();}
function renderAcctDetail(){const a=accounts.find(x=>x.id===adId);if(!a)return;const[y,m]=adYM;const ccy=a.ccy||'TWD',sym=ccyInfo(ccy).s;
 $('#adTitle').textContent=(a.ic||'')+' '+a.n;
 const monthTx=transactions.filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m&&(t.acct===adId||(t.type==='transfer'&&t.to===adId));}).sort((x,z)=>new Date(z.date)-new Date(x.date));
 let exp=0,inc=0,tout=0,tin=0,ce=0,ci=0,co=0,cti=0;
 monthTx.forEach(t=>{if(t.type==='expense'&&t.acct===adId){exp+=t.amt;ce++;}
  else if(t.type==='income'&&t.acct===adId){inc+=t.amt;ci++;}
  else if(t.type==='transfer'){if(t.acct===adId){tout+=t.amt+(t.fee||0);co++;}if(t.to===adId){tin+=(t.toAmt!=null?t.toAmt:t.amt);cti++;}}});
 const net=inc+tin-exp-tout,total=monthTx.length;
 const mx=Math.max(exp,inc,tout,tin,1);
 const bar=(v,c)=>`<div style="height:6px;border-radius:3px;background:${c};width:${Math.max(4,Math.round(v/mx*100))}%;"></div>`;
 const row=(lbl,cnt,v,c,sign)=>cnt?`<div style="display:flex;align-items:center;gap:10px;padding:5px 0"><span style="font-size:13px;color:var(--ink2);min-width:34px;font-weight:600">${lbl}</span><span style="background:${c};color:#fff;font-size:10.5px;font-weight:700;border-radius:9px;min-width:18px;height:18px;display:grid;place-items:center;padding:0 4px">${cnt}</span><div style="flex:1;min-width:0">${bar(v,c)}</div><span style="font-family:var(--num);font-weight:700;font-size:14px;color:${c};white-space:nowrap">${sign}${sym}${fmtN(v)}</span></div>`:'';
 // balance line chart: value at end of each day
 const days=new Date(y,m+1,0).getDate();const pts=[];for(let d=1;d<=days;d++){pts.push(acctBalanceAt(adId,new Date(y,m,d,23,59,59).getTime()));}
 let mn=Math.min(...pts),mxv=Math.max(...pts);if(mn===mxv){mn-=1;mxv+=1;}
 const W=320,H=90,px=i=>i/(days-1)*W,py=v=>H-((v-mn)/(mxv-mn))*(H-10)-5;
 const line=pts.map((v,i)=>(i?'L':'M')+px(i).toFixed(1)+','+py(v).toFixed(1)).join(' ');
 const chart=`<svg viewBox="0 0 ${W} ${H+18}" style="width:100%;display:block"><path d="${line} L${W},${H} L0,${H} Z" fill="var(--accent)" opacity=".08"/><path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/><text x="0" y="${H+14}" font-size="10" fill="var(--ink3)">${m+1}/1</text><text x="${W}" y="${H+14}" font-size="10" fill="var(--ink3)" text-anchor="end">${m+1}/${days}</text><text x="0" y="10" font-size="9.5" fill="var(--ink3)">${sym}${fmtN(mxv)}</text><text x="0" y="${H-2}" font-size="9.5" fill="var(--ink3)">${sym}${fmtN(mn)}</text></svg>`;
 // grouped list with end-of-day balance
 const groups={};monthTx.forEach(t=>{const k=dayKey(t.date);(groups[k]=groups[k]||[]).push(t);});
 let list='';Object.values(groups).forEach(g=>{const d0=new Date(g[0].date);const eod=acctBalanceAt(adId,new Date(d0.getFullYear(),d0.getMonth(),d0.getDate(),23,59,59).getTime());
  list+=`<div class="day-group"><div class="day-label"><span class="d">${dayLabel(g[0].date)}</span><span class="s">${sym}${fmtN(eod)}</span></div><div class="tx-list">${g.map(t=>txRowHTML(t)).join('')}</div></div>`;});
 if(!list)list='<div class="empty" style="padding:26px"><div class="e">🗒️</div><p>本月此帳戶沒有交易</p></div>';
 $('#adBody').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:center;gap:14px;padding:2px 0 10px">
    <button onclick="adShift(-1)" style="font-size:17px;padding:4px 12px;color:var(--ink2)">‹</button>
    <strong style="font-size:15px">${y}/${String(m+1).padStart(2,'0')}</strong>
    <button onclick="adShift(1)" style="font-size:17px;padding:4px 12px;color:var(--ink2)">›</button>
  </div>
  <div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:12px">
   ${row('支出',ce,exp,'var(--expense)','-')}${row('收入',ci,inc,'var(--income)','+')}${row('轉出',co,tout,'var(--transfer)','-')}${row('轉入',cti,tin,'#5b86e5','+')}
   <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:6px;padding-top:8px"><span style="font-size:13px;color:var(--ink2);font-weight:600">總計（${total} 筆）</span><span style="font-family:var(--num);font-weight:800;font-size:14.5px;color:${net>=0?'var(--income)':'var(--expense)'}">${net>=0?'+':'-'}${sym}${fmtN(Math.abs(net))}</span></div>
  </div>
  <div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px 8px;margin-bottom:14px">${chart}</div>
  ${list}`;}

 if(editAcctId){const a=accounts.find(x=>x.id===editAcctId);a.n=name;a.group=group;a.ccy=ccy;a.ic=afIcon;a.c=afColor;a.bal=bal;a.img=afImg||null;toast('帳戶已更新');}else{accounts.push({id:'a'+rnd(),n:name,group,ccy,ic:afIcon,c:afColor,bal,img:afImg||null});if(!cur.acct)cur.acct=accounts[accounts.length-1].id;toast('已新增帳戶');}

/* group manage */
function openGrp(){renderGrpSheet();$('#grpSheet').classList.add('open');syncMask();}
function closeGrp(){$('#grpSheet').classList.remove('open');syncMask();}
function renderGrpSheet(){const counts={};accounts.forEach(a=>counts[a.group]=(counts[a.group]||0)+1);
 const rows=groupOrder.map((g,i)=>`<div class="grow"><button class="mv" onclick="moveGroup(${i},-1)" ${i===0?'disabled':''}>↑</button><button class="mv" onclick="moveGroup(${i},1)" ${i===groupOrder.length-1?'disabled':''}>↓</button><input value="${String(g).replace(/"/g,'&quot;')}" onchange="renameGroup('${esc(g)}',this.value)"><span class="gcnt">${counts[g]||0}</span><button class="mv del" onclick="deleteGroup('${esc(g)}')" ${counts[g]?'disabled':''}>✕</button></div>`).join('');
 $('#grpBody').innerHTML=rows+`<div class="grow" style="margin-top:16px"><input id="newGrpName" placeholder="新增分組名稱…"><button class="save-btn" style="width:auto;margin:0;padding:11px 18px" onclick="addGroupFromInput()">新增</button></div><p class="hint">↑↓ 調整順序，直接修改文字即可改名（會同步底下帳戶）。只有沒有帳戶的分組才能刪除。</p>`;}
function moveGroup(i,dir){const j=i+dir;if(j<0||j>=groupOrder.length)return;const t=groupOrder[i];groupOrder[i]=groupOrder[j];groupOrder[j]=t;persistGroups();renderGrpSheet();renderOverview();}
function renameGroup(o,nn){nn=(nn||'').trim();if(!nn||nn===o){renderGrpSheet();return;}if(groupOrder.includes(nn)){toast('分組名稱重複');renderGrpSheet();return;}const idx=groupOrder.indexOf(o);if(idx<0)return;groupOrder[idx]=nn;accounts.forEach(a=>{if(a.group===o)a.group=nn;});collapsed=collapsed.map(g=>g===o?nn:g);persistGroups();renderGrpSheet();renderOverview();toast('分組已改名');}
function addGroup(name){name=(name||'').trim();if(name&&!groupOrder.includes(name)){groupOrder.push(name);persistGroups();return true;}return false;}
function addGroupFromInput(){if(addGroup($('#newGrpName').value)){renderGrpSheet();renderOverview();toast('已新增分組');}else toast('名稱空白或重複');}
function deleteGroup(g){if(accounts.some(a=>a.group===g)){toast('此分組仍有帳戶，無法刪除');return;}groupOrder=groupOrder.filter(x=>x!==g);persistGroups();renderGrpSheet();renderOverview();toast('分組已刪除');}

/* backup / export */
function download(filename,content,mime){try{const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){toast('此環境不支援下載，請於下載後的檔案中使用');}}
function ab2b64(buf){let s='';const b=new Uint8Array(buf);const ch=0x8000;for(let i=0;i<b.length;i+=ch)s+=String.fromCharCode.apply(null,b.subarray(i,i+ch));return btoa(s);}
function b642ab(b64){const s=atob(b64);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a.buffer;}
async function deriveKey(pw,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encryptText(plain,pw){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));const key=await deriveKey(pw,salt);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(plain));return JSON.stringify({wmoze:1,v:1,salt:ab2b64(salt),iv:ab2b64(iv),ct:ab2b64(ct)});}
async function decryptText(container,pw){const o=JSON.parse(container);const key=await deriveKey(pw,new Uint8Array(b642ab(o.salt)));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(b642ab(o.iv))},key,b642ab(o.ct));return new TextDecoder().decode(pt);}
async function shareFile(filename,content,mime){try{if(navigator.canShare){const file=new File([content],filename,{type:mime});if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:filename});return true;}}}catch(e){if(e&&e.name==='AbortError')return false;}download(filename,content,mime);return true;}
async function shareBackup(encrypt){const data=JSON.stringify(snapshot(),null,2);
 if(!encrypt){await shareFile('wallet_備份_'+ymd()+'.json',data,'application/json');toast('已匯出完整備份');return;}
 const pw=prompt('設定備份密碼（匯入時需輸入相同密碼，請記牢，遺失無法復原）：');if(pw==null)return;if(!pw||pw.length<4){toast('密碼至少 4 個字');return;}
 try{const enc=await encryptText(data,pw);await shareFile('wallet_備份_'+ymd()+'.wmoze',enc,'application/octet-stream');toast('已加密匯出');}catch(e){toast('加密失敗');}}
function csvCell(v){v=v==null?'':String(v);return /[",\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCSV(){const head=['日期','類型','分類','帳戶','轉入帳戶','金額','備註'];const tl={expense:'支出',income:'收入',transfer:'轉帳'};
 const rows=[...transactions].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(t=>{const d=new Date(t.date);const date=d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());const cat=t.type==='transfer'?'':(CATMAP[t.cat]?CATMAP[t.cat].n:'');const acc=accounts.find(a=>a.id===t.acct),to=accounts.find(a=>a.id===t.to);return [date,tl[t.type]||'',cat,acc?acc.n:'',to?to.n:'',t.amt,t.note||''];});
 const csv='\uFEFF'+[head,...rows].map(r=>r.map(csvCell).join(',')).join('\r\n');download('wallet_明細_'+ymd()+'.csv',csv,'text/csv;charset=utf-8');toast('已匯出 '+rows.length+' 筆明細 CSV');}
function snapshot(){return {app:'小錢包',version:4,savedAt:dataStamp,exportedAt:new Date().toISOString(),accounts,transactions,budgets,groupOrder,collapsed,expCats,incCats,recurrings,goals,fxRates,fxDate};}
function applySnapshot(d){if(!d||!d.accounts||!d.transactions)throw 0;
 accounts=d.accounts;transactions=d.transactions;budgets=d.budgets||{};groupOrder=d.groupOrder||[...DEFGROUPS];collapsed=d.collapsed||[];expCats=d.expCats||DEF_EXP.map(c=>({...c}));incCats=d.incCats||DEF_INC.map(c=>({...c}));recurrings=d.recurrings||[];goals=d.goals||[];if(d.fxRates)fxRates=d.fxRates;if(d.fxDate)fxDate=d.fxDate;
 accounts.forEach(a=>{if(!a.ccy)a.ccy='TWD';if(!groupOrder.includes(a.group))groupOrder.push(a.group);});rebuildCatMap();
 Store.set('accounts',accounts);Store.set('transactions',transactions);Store.set('budgets',budgets);Store.set('collapsed',collapsed);Store.set('groupOrder',groupOrder);Store.set('expCats',expCats);Store.set('incCats',incCats);Store.set('recurrings',recurrings);Store.set('goals',goals);Store.set('fxRates',fxRates);Store.set('fxDate',fxDate);
 dataStamp=d.savedAt||Date.now();Store.set('dataStamp',dataStamp);}
function exportBackup(){download('wallet_備份_'+ymd()+'.json',JSON.stringify(snapshot(),null,2),'application/json');toast('已匯出完整備份');}
function importBackup(file){const r=new FileReader();r.onload=async()=>{const txt=r.result;let obj=null;
 try{obj=JSON.parse(txt);}catch(e){toast('檔案格式錯誤，無法還原');return;}
 if(obj&&obj.wmoze){const pw=prompt('請輸入此備份的密碼：');if(pw==null)return;try{obj=JSON.parse(await decryptText(txt,pw));}catch(e){toast('密碼錯誤或檔案毀損');return;}}
 try{applySnapshot(obj);closeAll();renderOverview();toast('已從備份還原');}catch(e){toast('檔案格式錯誤，無法還原');}};r.readAsText(file);}
function resetData(){if(!confirm('確定清除所有資料並還原為範例？此動作無法復原。'))return;try{['accounts','transactions','budgets','collapsed','groupOrder','expCats','incCats','recurrings','goals','goals_seeded','seed_v3','dataStamp'].forEach(k=>localStorage.removeItem(k));}catch(e){}location.reload();}

/* Google Drive sync */
const GD={token:null,exp:0};let gdTimer=null;
const FILENAME='wallet_backup.json';
function gClientId(){return (Store.get('gdClientId','')||'').trim();}
function saveGdClientId(){Store.set('gdClientId',($('#gdClientId').value||'').trim());toast('已儲存 Client ID');renderGdRow();}
function gisLoaded(){return !!(window.google&&google.accounts&&google.accounts.oauth2);}
function gRequestToken(interactive){return new Promise((resolve,reject)=>{if(!gisLoaded()){reject('gis');return;}const cid=gClientId();if(!cid){reject('cid');return;}
 const tc=google.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/drive.appdata',
  callback:(resp)=>{if(resp&&resp.access_token){GD.token=resp.access_token;GD.exp=Date.now()+((resp.expires_in||3500)*1000);resolve(GD.token);}else reject('noaccess');},
  error_callback:(err)=>reject(err)});
 tc.requestAccessToken({prompt:interactive?'':'none'});});}
async function gToken(interactive){if(GD.token&&Date.now()<GD.exp-60000)return GD.token;return await gRequestToken(interactive);}
async function gFindFile(token){const q=encodeURIComponent("name='"+FILENAME+"'");const r=await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime)&q='+q,{headers:{Authorization:'Bearer '+token}});const d=await r.json();return(d.files&&d.files[0])||null;}
async function gDownload(token,id){const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+token}});return await r.json();}
async function gUpload(token,id,obj){const meta={name:FILENAME};if(!id)meta.parents=['appDataFolder'];const b='wlt'+Math.random().toString(36).slice(2);
 const body='--'+b+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+b+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(obj)+'\r\n--'+b+'--';
 const url=id?('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=multipart'):'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
 await fetch(url,{method:id?'PATCH':'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+b},body});}
async function gdSync(interactive){if(!gClientId()){if(interactive)toast('請先貼上並儲存 Google Client ID');return;}
 try{const token=await gToken(interactive);const file=await gFindFile(token);let remote=null;if(file){try{remote=await gDownload(token,file.id);}catch(e){}}
  const rs=(remote&&remote.savedAt)||0;
  if(remote&&rs>dataStamp){applySnapshot(remote);renderOverview();toast('已從雲端更新資料');}
  else{await gUpload(token,file?file.id:null,snapshot());if(interactive)toast('已同步到雲端');}
  Store.set('gdConnected',true);Store.set('gdLastSync',Date.now());renderGdRow();
 }catch(e){if(interactive)toast('同步失敗：請確認已連結並完成授權');}}
async function gdConnectToggle(){if(Store.get('gdConnected',false)){GD.token=null;GD.exp=0;Store.set('gdConnected',false);renderGdRow();toast('已解除連結（手機本機資料保留）');return;}
 if(!gClientId()){toast('請先貼上並儲存 Google Client ID');return;}if(!gisLoaded()){toast('Google 元件載入中，請稍候再試');return;}
 try{await gToken(true);Store.set('gdConnected',true);toast('已連結 Google Drive');renderGdRow();await gdSync(true);}catch(e){toast('連結失敗，請確認 Client ID 與授權網域');renderGdRow();}}
function toggleGdAuto(){const v=!Store.get('gdAuto',false);Store.set('gdAuto',v);renderGdRow();toast(v?'已開啟自動同步':'已關閉自動同步');}
function gdAutoPush(){if(!Store.get('gdAuto',false)||!Store.get('gdConnected',false))return;clearTimeout(gdTimer);gdTimer=setTimeout(()=>gdSync(false),2500);}
function renderGdRow(){const el=$('#gdRow');if(!el)return;const conn=Store.get('gdConnected',false),last=Store.get('gdLastSync',0);
 el.innerHTML=conn?('狀態：已連結　'+(last?('上次同步 '+new Date(last).toLocaleString('zh-TW')):'尚未同步')):'狀態：未連結。資料會存在手機本機；連結後可備份/同步到你自己的 Google Drive（App 專屬隱藏資料夾）。';
 const lbl=$('#gdConnectLbl');if(lbl)lbl.textContent=conn?'🔌 解除連結':'🔗 連結 Google Drive';
 const av=$('#gdAutoVal');if(av)av.textContent=Store.get('gdAuto',false)?'開':'關';
 const ci=$('#gdClientId');if(ci&&!ci.value)ci.value=gClientId();}
function gdInitOnLoad(){if(!Store.get('gdConnected',false)||!gClientId())return;let n=0;const iv=setInterval(()=>{n++;if(gisLoaded()){clearInterval(iv);gdSync(false);}else if(n>25)clearInterval(iv);},300);}

/* misc */
let toastT;function toast(m){const el=$('#toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}
$('#eyeBtn').onclick=()=>{hideAmt=!hideAmt;Store.set('hideAmt',hideAmt);$('#eyeBtn').textContent=hideAmt?'🙈':'👁';renderOverview();};
function initTheme(){const s=Store.get('theme','light');document.documentElement.setAttribute('data-theme',s);}
function toggleTheme(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);Store.set('theme',t);$('#setThemeVal').textContent=t==='dark'?'深色':'淺色';}
$('#acctSel').onchange=e=>{cur.acct=e.target.value;cur.ccy=acctCcy(cur.acct);updateCurSign();};
$('#tfFrom').onchange=()=>{updateCurSign();updateTfTotal();};
$('#afFile').onchange=e=>{if(e.target.files[0])loadImg(e.target.files[0]);e.target.value='';};
$('#importFile').onchange=e=>{if(e.target.files[0])importBackup(e.target.files[0]);e.target.value='';};
$('#txPhotoFile').onchange=e=>{if(e.target.files[0])loadTxPhoto(e.target.files[0]);e.target.value='';};

initTheme();$('#eyeBtn').textContent=hideAmt?'🙈':'👁';postDueRecurrings();renderOverview();fetchRates(false);gdInitOnLoad();
try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('portrait').catch(()=>{});}catch(e){}
window.addEventListener('orientationchange',()=>setTimeout(()=>{window.scrollTo(0,0);document.body.scrollTop=0;},350));
window.addEventListener('resize',()=>{window.scrollTo(0,0);});
document.addEventListener('focusout',()=>setTimeout(()=>{window.scrollTo(0,0);document.documentElement.scrollTop=0;document.body.scrollTop=0;},80));
